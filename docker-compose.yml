
services:
  context-manager:
    build: .
    container_name: context-manager
    ports:
      - "3847:3847"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/context_db}
      - QDRANT_HOST=qdrant-new
      - QDRANT_PORT=6333
      - TEI_HOST=http://tei-embeddings:80
      - EMBEDDING_PROVIDER=huggingface-tei
      - EMBEDDING_DIMENSIONS=384
      - HOST=0.0.0.0
      - PORT=3847
    networks:
      - orchestrator-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    depends_on:
      - tei-embeddings
    restart: unless-stopped

  tei-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8.3
    pull_policy: if_not_present
    container_name: tei-embeddings
    shm_size: 1024m
    mem_limit: 1536m
    mem_reservation: 768m
    ports:
      - "8080:80"
    networks:
      - orchestrator-network
    volumes:
      - ${MODELS_DIR:-./models}/multilingual-e5-small_Q8/onnx:/data:ro
    environment:
      - RAYON_NUM_THREADS=4
      - OMP_NUM_THREADS=4
      - MALLOC_ARENA_MAX=2
      - HF_HUB_OFFLINE=1
      - OMP_WAIT_POLICY=PASSIVE
    command: >
      --model-id /data
      --pooling mean
      --tokenization-workers 3
      --max-batch-tokens 1024
      --max-concurrent-requests 16
      --max-batch-requests 8
      --auto-truncate
    restart: unless-stopped

  cm-mcp-adapter:
    image: node:22-alpine
    container_name: cm-mcp-adapter
    working_dir: /app
    volumes:
      - ${MCP_DIR:-./mcp}:/app:ro
    command: node cm_http_adapter.mjs
    ports:
      - "8770:8770"
    environment:
      - CM_API_BASE=http://context-manager:3847/api/context
      - CM_MCP_PORT=8770
    networks:
      - orchestrator-network
    depends_on:
      - context-manager
    mem_limit: 64m
    restart: unless-stopped

networks:
  orchestrator-network:
    name: orchestrator-network
    external: true

