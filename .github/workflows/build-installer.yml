name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # Запускается только при пуше тега vX.X.X
  workflow_dispatch:  # Ручной запуск из GitHub UI

jobs:
  build-installer:
    name: Build context-manager-setup.exe
    runs-on: windows-latest  # Полноценная Windows VM — нужна для Inno Setup

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout репозитория
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Установить Node.js (нужен для npm install + tsc)
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # -----------------------------------------------------------------------
      # 3. npm install + TypeScript build
      # -----------------------------------------------------------------------
      - name: Build Node.js project
        run: |
          npm ci --silent
          npm run build
        shell: pwsh

      # -----------------------------------------------------------------------
      # 4. Скачать Qdrant бинарь для Windows
      # -----------------------------------------------------------------------
      - name: Download Qdrant for Windows
        run: |
          $qdrantVersion = "v1.13.1"
          $qdrantUrl = "https://github.com/qdrant/qdrant/releases/download/$qdrantVersion/qdrant-x86_64-pc-windows-msvc.zip"
          $zipPath = "$env:TEMP\qdrant.zip"

          Invoke-WebRequest -Uri $qdrantUrl -OutFile $zipPath -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "bin" | Out-Null

          $shell = New-Object -ComObject Shell.Application
          $zip   = $shell.NameSpace($zipPath)
          $dest  = $shell.NameSpace("$PWD\bin")
          $dest.CopyHere($zip.Items(), 0x14)
        shell: pwsh

      # -----------------------------------------------------------------------
      # 5. Скачать NSSM
      # -----------------------------------------------------------------------
      - name: Download NSSM
        run: |
          $nssmUrl  = "https://nssm.cc/release/nssm-2.24.zip"
          $zipPath  = "$env:TEMP\nssm.zip"

          Invoke-WebRequest -Uri $nssmUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath "$env:TEMP\nssm-extract" -Force

          $nssmExe = Get-ChildItem "$env:TEMP\nssm-extract" -Recurse -Filter "nssm.exe" |
                     Where-Object { $_.FullName -match "win64" } |
                     Select-Object -First 1
          Copy-Item $nssmExe.FullName "bin\nssm.exe" -Force
        shell: pwsh

      # -----------------------------------------------------------------------
      # 6. Подготовить структуру папок для Inno Setup
      # -----------------------------------------------------------------------
      - name: Prepare installer source structure
        run: |
          # app\ — скомпилированный проект
          New-Item -ItemType Directory -Force -Path "app\dist" | Out-Null
          New-Item -ItemType Directory -Force -Path "app\mcp"  | Out-Null
          Copy-Item "dist\*"       "app\dist\"   -Recurse -Force
          Copy-Item "mcp\*"        "app\mcp\"    -Recurse -Force
          Copy-Item ".env.windows" "app\.env.windows" -Force
          Copy-Item "package.json" "app\"        -Force

          # embed\ — Python embedder
          New-Item -ItemType Directory -Force -Path "embed" | Out-Null
          Copy-Item "embed\*" "embed\" -Recurse -Force

          # scripts\
          New-Item -ItemType Directory -Force -Path "scripts" | Out-Null
          Copy-Item "scripts\change-pg-password.ps1" "scripts\" -Force

          # installer\ — выходная папка
          New-Item -ItemType Directory -Force -Path "installer" | Out-Null
        shell: pwsh

      # -----------------------------------------------------------------------
      # 7. Установить Inno Setup
      # -----------------------------------------------------------------------
      - name: Install Inno Setup
        run: |
          $issUrl = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $issExe = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $issUrl -OutFile $issExe -UseBasicParsing
          Start-Process $issExe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
        shell: pwsh

      # -----------------------------------------------------------------------
      # 8. Сборка installer .exe через Inno Setup
      # -----------------------------------------------------------------------
      - name: Build installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "context-manager-setup.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Installer built: $(Get-Item installer\*.exe | Select-Object -ExpandProperty FullName)"
        shell: pwsh

      # -----------------------------------------------------------------------
      # 9. Загрузить .exe как артефакт (доступен для скачивания из CI)
      # -----------------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-manager-setup
          path: installer\context-manager-setup.exe
          retention-days: 30

      # -----------------------------------------------------------------------
      # 10. Публикация в GitHub Releases (только при пуше тега)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\context-manager-setup.exe
          name: "Context Manager ${{ github.ref_name }}"
          body: |
            ## Context Manager ${{ github.ref_name }} — Windows Installer

            ### Установка (Windows 10/11)

            1. Скачайте `context-manager-setup.exe` ниже
            2. Запустите от имени Администратора
            3. Следуйте мастеру установки (Next → Next → Finish)

            Установщик автоматически:
            - Установит Node.js LTS и PostgreSQL 16
            - Настроит все фоновые сервисы
            - Создаст файл с паролем базы данных

            ### Системные требования
            - Windows 10 (1803+) или Windows 11
            - 4 GB RAM минимум
            - 2 GB свободного места на диске
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
